service: alexa-bob

frameworkVersion: '3'

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false  # Set true if you have Docker (needed for packages with C extensions)
    slim: true

provider:
  name: aws
  runtime: python3.11
  region: eu-west-1
  stage: ${opt:stage, 'dev'}
  memorySize: 1024
  timeout: 30  # Alexa allows up to 8s response; Lambda needs headroom
  environment:
    OPENAI_MODEL: ${env:OPENAI_MODEL, 'gpt-4o-mini'}
    MAX_OUTPUT_TOKENS: ${env:MAX_OUTPUT_TOKENS, '280'}
    OPENAI_REQUEST_TIMEOUT: '6'
    OPENAI_SECRET_ARN: !Ref OpenAISecret
    ENABLE_WEB_SEARCH: ${env:ENABLE_WEB_SEARCH, 'true'}
    OPENAI_SEARCH_TIMEOUT: ${env:OPENAI_SEARCH_TIMEOUT, '6'}
    ENABLE_MEMORY: ${env:ENABLE_MEMORY, 'true'}
    MEMORY_TABLE: !Ref MemoryTable
    ENABLE_PROGRESSIVE_RESPONSE: ${env:ENABLE_PROGRESSIVE_RESPONSE, 'true'}
    PROGRESSIVE_MIN_WORDS: ${env:PROGRESSIVE_MIN_WORDS, '8'}
    PROGRESSIVE_QUESTION_PHRASES_PARAM: !Ref ProgressiveQuestionPhrasesParam
    PROGRESSIVE_CHAT_PHRASES_PARAM: !Ref ProgressiveChatPhrasesParam
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: !Ref OpenAISecret
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
          Resource: !GetAtt MemoryTable.Arn
        - Effect: Allow
          Action:
            - ssm:GetParameter
          Resource:
            - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ProgressiveQuestionPhrasesParam}"
            - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ProgressiveChatPhrasesParam}"

functions:
  alexa:
    handler: src.handler.lambda_handler
    description: Alexa skill backend for Bob

# Secret for OpenAI API key - create manually or via separate stack
resources:
  Resources:
    AlexaInvokePermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Ref: AlexaLambdaFunction
        Action: lambda:InvokeFunction
        Principal: alexa-appkit.amazon.com
        EventSourceToken: amzn1.ask.skill.69625f69-8ba9-45e2-9fc2-99dbb71bef3e

    MemoryTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:service}-${self:provider.stage}-memory
        BillingMode: PAY_PER_REQUEST
        TableClass: STANDARD_INFREQUENT_ACCESS
        TimeToLiveSpecification:
          AttributeName: ttl_epoch
          Enabled: true
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH

    ProgressiveQuestionPhrasesParam:
      Type: AWS::SSM::Parameter
      Properties:
        Name: /${self:service}/${self:provider.stage}/progressive-question-phrases
        Type: String
        Value: '["Let me think about that.", "Good question, let me think.", "Let me find out.", "One moment."]'
        Description: Progressive response phrases for question-type utterances

    ProgressiveChatPhrasesParam:
      Type: AWS::SSM::Parameter
      Properties:
        Name: /${self:service}/${self:provider.stage}/progressive-chat-phrases
        Type: String
        Value: '["Let me think about that.", "Hmm, let me think."]'
        Description: Progressive response phrases for conversational utterances

    OpenAISecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: ${self:service}-${self:provider.stage}/openai-api-key
        Description: OpenAI API key for Alexa skill Bob
        # Generate placeholder; replace with actual key via Console or CLI
        SecretString: '{"OPENAI_API_KEY": "replace-me-after-first-deploy"}'
